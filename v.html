<meta name="robots" content="noindex,nofollow">

<title>HANDYMAN 車両ダメージレポート</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;background:#0a0e18;color:#e0e6f0;min-height:100vh;max-width:520px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom);overflow-x:hidden;}
.app{padding:0 14px 24px;}

/* ヘッダー */
.hd{padding:max(env(safe-area-inset-top),12px) 0 8px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.hd-brand{font-size:11px;font-weight:800;color:#7099d4;letter-spacing:.5px;}
.hd-store{font-size:11px;color:#aabbcc;font-weight:600;}
.hd-today{font-size:10px;color:#8899aa;text-align:right;line-height:1.4;}

/* 車両情報カード（"車種 / ナンバー" 1行のみ） */
.vh-card{margin-top:6px;padding:14px 16px;background:linear-gradient(135deg,#13192a,#1a2238);border:1px solid #2a3552;border-radius:14px;box-shadow:0 4px 16px #00000040;}
.vh-plate{font-size:22px;font-weight:900;color:#fff;letter-spacing:.5px;line-height:1.2;}

/* 車両図エリア */
.car-wrap{margin-top:12px;background:#fff;border-radius:14px;padding:14px;box-shadow:0 4px 16px #00000040;}
.car-view{position:relative;width:100%;aspect-ratio:270/430;max-width:340px;margin:0 auto;}

/* 凡例 */
.legend{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px 14px;padding:8px 12px;background:#11172a;border-radius:10px;border:1px solid #2a3552;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#aabbcc;font-weight:600;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-empty{font-size:11px;color:#5d7d9a;font-weight:600;}

/* ピン */
.ipin{position:absolute;transform:translate(-50%,-50%);pointer-events:all;cursor:pointer;}
.ipin-r{width:22px;height:22px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;animation:pRing 2.2s ease-in-out infinite;background:rgba(0,0,0,.05);transition:transform .15s;}
.ipin:active .ipin-r{transform:scale(1.25);}
.ipin-c{width:7px;height:7px;border-radius:50%;}
.ipin-lbl{position:absolute;bottom:-17px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:8px;font-weight:700;background:#1a2840ee;color:#fff;padding:2px 5px;border-radius:4px;pointer-events:none;}
@keyframes pRing{0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,.4);}50%{box-shadow:0 0 0 5px rgba(255,68,68,0);}}

/* 案内文 */
.tip{margin-top:10px;padding:10px 14px;font-size:11px;color:#7099d4;background:#0e1424;border:1px solid #1f2a48;border-radius:10px;display:flex;align-items:center;gap:8px;line-height:1.5;}
.tip-ico{font-size:14px;}

/* 写真ライトボックス */
.photo-lb{position:fixed;inset:0;background:#000;z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;max-width:520px;margin:0 auto;display:flex;flex-direction:column;}
.photo-lb.show{opacity:1;pointer-events:all;}
.photo-lb-header{padding:max(env(safe-area-inset-top),52px) 16px 10px;display:flex;align-items:center;gap:12px;}
.photo-lb-close{width:36px;height:36px;border-radius:10px;background:#ffffff18;border:1px solid #ffffff20;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.photo-lb-hd-info{flex:1;min-width:0;}
.photo-lb-hd-loc{font-size:16px;font-weight:800;color:#fff;}
.photo-lb-hd-sub{font-size:10px;color:#8899bb;margin-top:2px;}
.photo-lb-canvas{flex:1;display:flex;align-items:center;justify-content:center;padding:0 16px;overflow:hidden;}
.photo-lb-canvas-inner{width:100%;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px #00000080;}
.photo-lb-canvas-inner img{width:100%;display:block;}
.photo-lb-footer{padding:16px 20px;padding-bottom:max(env(safe-area-inset-bottom),32px);}
.photo-lb-desc{font-size:13px;color:#ccd8e8;line-height:1.7;}
.photo-lb-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.photo-lb-tag{font-size:10px;padding:4px 10px;border-radius:8px;border:1px solid #ffffff20;color:#aabbcc;font-weight:700;background:#ffffff08;}

/* エラー画面 */
.err-view{display:none;min-height:60vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;gap:12px;}
.err-icon{font-size:48px;}
.err-title{font-size:18px;font-weight:800;color:#fff;}
.err-desc{font-size:13px;color:#8899aa;line-height:1.6;max-width:320px;}

/* ローディング */
.loading{display:flex;justify-content:center;align-items:center;min-height:50vh;color:#7099d4;font-size:13px;}
.loading::before{content:'';width:24px;height:24px;border:3px solid #2a3552;border-top-color:#7099d4;border-radius:50%;animation:spin 1s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* フッター */
.ft{margin-top:16px;padding:12px;font-size:9px;color:#5d7d9a;text-align:center;line-height:1.6;}
.ft-divider{margin:0 6px;color:#3d4d6a;}
</style>
</head>

    l:(xOff + cx/100*rw)/W*100,
    t:(yOff + cy/100*rh)/H*100
  };
}

let currentVehicle=null;

// ===== 車両図描画（リードオンリー版） =====
function renderMap(damages){
  const view=document.getElementById('carView');
  if(!view) return;
  // SVG を template から取得して埋め込み
  const tpl=document.getElementById('carSvgTpl');
  view.innerHTML='';
  view.appendChild(tpl.content.cloneNode(true));

  // 描画後にサイズ確定するため次フレームで処理
  requestAnimationFrame(()=>{
    const W=view.clientWidth||view.offsetWidth||0;
    const H=view.clientHeight||view.offsetHeight||0;
    const zoneCountMap={};

    (damages||[]).forEach(d=>{
      let zone=null;
      const loc=d.location||'';
      if(ZONE_MAP[loc]) zone=ZONE_MAP[loc];
      if(!zone){
        const keys=Object.keys(ZONE_MAP).sort((a,b)=>b.length-a.length);
        for(const k of keys){ if(loc.includes(k)){ zone=ZONE_MAP[k]; break; }}
      }
      if(!zone) return;

      if(!zoneCountMap[zone.id]) zoneCountMap[zone.id]={count:0};
      const pinIdx=zoneCountMap[zone.id].count++;

      const c=dmgColor(d);
      const pin=document.createElement('div');
      pin.className='ipin';
      const offsetR=pinIdx>0?4.5:0;
      const offsetAngle=(pinIdx*137.5)*(Math.PI/180);
      const oxPct=pinIdx>0?offsetR*Math.cos(offsetAngle):0;
      const oyPct=pinIdx>0?offsetR*Math.sin(offsetAngle):0;
      const p=pinPct(zone.cx+oxPct, zone.cy+oyPct, W, H);
      pin.style.cssText=`left:${p.l}%;top:${p.t}%;`;
      pin.dataset.dmgId=d.id;
      pin.innerHTML=`<div class="ipin-r" style="border-color:${c}80;"><div class="ipin-c" style="background:${c};"></div></div><div class="ipin-lbl">${d.location}</div>`;
      pin.addEventListener('click',(e)=>{
        e.stopPropagation();
        openPhotoLB(d.id);
      });
      view.appendChild(pin);

      const el=view.querySelector('#'+zone.id);
      if(el){
        const hFill={major:'#ffcccc',moderate:'#ffe0b8',minor:'#fff3cc',scratch:'#ffcccc',dent:'#ffe0b8',chip:'#fff0b0',crack:'#cce0ff',stone_chip:'#bbebff'};
        const hStroke={major:'#dd2222',moderate:'#cc6600',minor:'#cc9900',scratch:'#dd2222',dent:'#cc6600',chip:'#cc8800',crack:'#2255cc',stone_chip:'#0088cc'};
        el.style.fill=hFill[d.severity]||hFill[d.type]||'#ffeecc';
        el.setAttribute('stroke',hStroke[d.severity]||hStroke[d.type]||'#cc8800');
        el.setAttribute('stroke-width','2');
      }
    });

    // 凡例描画
    const legend=document.getElementById('legend');
    if(legend){
      if(!damages||damages.length===0){
        legend.innerHTML='<div class="legend-empty">✨ 傷の登録はありません（クリーンな状態です）</div>';
      } else {
        legend.innerHTML=damages.map(d=>{
          const c=dmgColor(d);
          return `<div class="legend-item"><div class="legend-dot" style="background:${c};"></div>${d.location}</div>`;
        }).join('');
      }
    }
  });
}

// ===== 写真ライトボックス（個人情報・担当者は非表示） =====
function openPhotoLB(dmgId){
  if(!currentVehicle) return;
  const d=(currentVehicle.current_damages||[]).find(x=>x.id===dmgId);
  if(!d) return;
  const inner=document.getElementById('lbCanvasInner');
  if(d.photo){
    inner.innerHTML=`<img src="${d.photo}" alt="${d.location}">`;
  } else {
    inner.innerHTML=`<div style="aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#1a2536;color:#5d7d9a;font-size:13px;border-radius:12px;">📷 写真は登録されていません</div>`;
  }
  document.getElementById('lbLoc').textContent=d.location||'—';
  // 担当者名は非表示（addedBy をマスキング）— 記録日付のみ
  document.getElementById('lbSub').textContent=(d.addedAt||'—')+' 記録';
  document.getElementById('lbDesc').textContent=d.desc||'';
  const meta=document.getElementById('lbMeta');
  const tL={scratch:'擦り傷',dent:'凹み',chip:'塗装欠け',crack:'ひび割れ',other:'その他',stone_chip:'飛び石'};
  const sL={minor:'軽微',moderate:'中程度',major:'重大'};
  if(meta){
    const tags=[];
    if(d.type) tags.push(`<div class="photo-lb-tag">${tL[d.type]||d.type}</div>`);
    if(d.severity) tags.push(`<div class="photo-lb-tag">${sL[d.severity]||d.severity}</div>`);
    meta.innerHTML=tags.join('');
  }
  document.getElementById('photoLb').classList.add('show');
}
function closePhotoLB(e){
  if(e&&e.target!==document.getElementById('photoLb')&&!e.target.classList.contains('photo-lb-close'))return;
  document.getElementById('photoLb').classList.remove('show');
}
window.closePhotoLB=closePhotoLB;

// ===== 日時フォーマット =====
function formatDateTime(iso){
  if(!iso) return '';
  try{
    const d=new Date(iso);
    if(isNaN(d.getTime())) return iso;
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0');
    const hh=String(d.getHours()).padStart(2,'0');
    const mi=String(d.getMinutes()).padStart(2,'0');
    return `${y}/${m}/${dd} ${hh}:${mi}`;
  }catch(e){ return iso; }
}
function formatToday(){
  const d=new Date();
  const wd=['日','月','火','水','木','金','土'][d.getDay()];
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const hh=String(d.getHours()).padStart(2,'0');
  const mi=String(d.getMinutes()).padStart(2,'0');
  return `閲覧: ${y}/${m}/${dd}(${wd})<br>${hh}:${mi}`;
}

// ===== エラー表示 =====
function showError(title, desc){
  document.getElementById('loadingView').style.display='none';
  document.getElementById('mainView').style.display='none';
  const errView=document.getElementById('errView');
  errView.style.display='flex';
  if(title) document.getElementById('errTitle').textContent=title;
  if(desc) document.getElementById('errDesc').innerHTML=desc;
}

// ===== メイン: トークン取得 → DB照会 → 表示 =====
async function loadShareData(){
  const params=new URLSearchParams(location.search);
  const token=params.get('t');
  if(!token){
    showError('共有リンクが無効です','URL にトークンが含まれていません。');
    return;
  }
  // UUID 形式チェック
  if(!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(token)){
    showError('共有リンクが無効です','URL のトークン形式が不正です。');
    return;
  }
  try{
    const SEL='id,store,display_label,current_damages,last_check_at,share_enabled';
    let {data,error}=await sb.from('vehicle_twins').select(SEL).eq('share_token',token).maybeSingle();
    // main で見つからなければ BT(高松/独立DB) を照合
    if(!error && !data){
      const bt=await sbBT.from('vehicle_twins').select(SEL).eq('share_token',token).maybeSingle();
      if(!bt.error && bt.data){ data=bt.data; }
    }
    if(error){
      console.error('[v.html] DB error:',error);
      showError('読込エラー','データ取得に失敗しました。<br>時間を置いて再度アクセスしてください。');
      return;
    }
    if(!data){
      showError('共有リンクは利用できません','このリンクは無効または停止されています。<br>HANDYMAN までお問い合わせください。');
      return;
    }
    if(!data.share_enabled){
      showError('共有が停止されています','このリンクの共有は停止されました。<br>HANDYMAN までお問い合わせください。');
      return;
    }
    currentVehicle=data;
    renderVehicle(data);
  }catch(e){
    console.error('[v.html] exception:',e);
    showError('読込エラー','通信に失敗しました。<br>Wi-Fi/モバイル回線をご確認ください。');
  }
}

function renderVehicle(v){
  document.getElementById('loadingView').style.display='none';
  document.getElementById('mainView').style.display='block';

  // 店舗
  const storeLabel=v.store==='naha'?'那覇空港店':(v.store==='sapporo'?'札幌店':(v.store==='takamatsu'?'高松店':''));
  document.getElementById('storeLabel').textContent=storeLabel;

  // 本日日付
  document.getElementById('todayLabel').innerHTML=formatToday();

  // 車両情報: "車種 / ナンバー" 1行のみ表示（最終チェック日時は表示しない）
  // 後方互換ロジック（過去のフォーマット履歴に対応）:
  //   v1 パイプ形式 "プレート|車種 ／ ID"           → "車種 / プレート" に変換
  //   v2 スラッシュ形式 "プレート / 車種 / 年式"     → "車種 / プレート" に変換
  //   v3 新形式 "車種 / プレート"                    → そのまま表示
  let label=(v.display_label||v.id||'--').trim();
  if(label.indexOf('|')>=0){
    // v1 パイプ形式
    const parts=label.split('|');
    const plate=(parts[0]||'').trim();
    const modelLine=(parts[1]||'').trim();
    const modelOnly=modelLine.split(/ ／ | \/ |\//)[0].trim();
    label=modelOnly?(modelOnly+' / '+plate):plate;
  } else if(label.indexOf(' / ')>=0){
    // v2 vs v3 判別: 先頭が数字/英字始まりで日本語カナを含まなければ v2（プレート先頭）
    const parts=label.split(' / ').map(s=>s.trim()).filter(Boolean);
    if(parts.length>=2){
      const first=parts[0];
      const hasKana=/[ぁ-んァ-ヶー一-龯]/.test(first);
      if(!hasKana && /^[\dA-Za-z]/.test(first)){
        // v2 旧スラッシュ形式 → name + plate に並べ替え（年式は捨てる）
        const plate=parts[0];
        const name=parts[1]||'';
        label=name?(name+' / '+plate):plate;
      }
      // それ以外（v3 新形式 "ノア / 5398"）はそのまま使う
    }
  }
  document.getElementById('plate').textContent=label;

  // 車両図描画
  renderMap(v.current_damages||[]);
}

// 起動
loadShareData();
</script>
